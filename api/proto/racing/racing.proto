syntax = "proto3";
package racing;

option go_package = "/racing";

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";

service Racing {
  // ListRaces returns a list of all races.
  rpc ListRaces(ListRacesRequest) returns (ListRacesResponse) {
    option (google.api.http) = { post: "/v1/list-races", body: "*" };
  }
}

/* Requests/Responses */

// Request for ListRaces call.
message ListRacesRequest {
  ListRacesRequestFilter filter = 1;
}

// Response to ListRaces call.
message ListRacesResponse {
  repeated Race races = 1;
}

// Filter for listing races.
message ListRacesRequestFilter {
  repeated int64 meeting_ids = 1;
  // When true, only races flagged visible are returned. Defaults to false (return all).
  bool visible_only = 2;
  // Field name to sort by. Empty defaults to advertised_start_time. Validated against
  // a service-layer allowlist; invalid values return codes.InvalidArgument.
  string sort_by = 3;
  // Sort direction. Defaults to ASC.
  SortDirection sort_direction = 4;
}

// Sort direction for ListRaces ordering.
enum SortDirection {
  ASC = 0;
  DESC = 1;
}

/* Resources */

// A race resource.
message Race {
  // ID represents a unique identifier for the race.
  int64 id = 1;
  // MeetingID represents a unique identifier for the races meeting.
  int64 meeting_id = 2;
  // Name is the official name given to the race.
  string name = 3;
  // Number represents the number of the race.
  int64 number = 4;
  // Visible represents whether or not the race is visible.
  bool visible = 5;
  // AdvertisedStartTime is the time the race is advertised to run.
  google.protobuf.Timestamp advertised_start_time = 6;
  // Status is derived at read time from advertised_start_time vs now.
  // OPEN = start is in the future. CLOSED = start is in the past.
  RaceStatus status = 7;
}

// RaceStatus represents the current lifecycle state of a race.
// Derived at read time; never persisted.
enum RaceStatus {
  OPEN = 0;
  CLOSED = 1;
}
